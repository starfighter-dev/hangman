<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <title>Hangman</title>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
      <style type="text/css">
         .wordProgress {
            font-size: 2em;
            letter-spacing: 0.2em;
         }
         .gameoverText {
            color: red;
            font-size: 3em;
         }
         .rainbowText {
            font-size: 3em;
            background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
         }
         .guessedLetters {
            font-size: 2em;
            letter-spacing: 0.2em;
            color: red;
         }
      </style>
   </head>
   <body>
      <div class="container">
         <div class="row mt-4">
            <div class="col text-center">
               <h1 class="rainbowText">Hangman JS</h1>
            </div>
         </div>
         <div class="row">
            <div class="col text-center">
               <div class="wordProgress" id="wordProgress"></div>
            </div>
         </div>

         <div class="row mt-4">
            <div class="col text-center">
               <div class="guessedLetters" id="guessedLetters"></div>
               <div class="attemptsLeft mt-2" id="attemptsLeft"></div>
            </div>
         </div>

         <div class="row mt-4" id="messageDisplay" style="display:none;">
            <div class="col text-center">
               <div class="alert alert-info" id="message"></div>
            </div>
         </div>

         <div class="row mt-4">
            <div class="col text-center">
               <label for="letter">Guess a letter:</label>
               <input id="userInput" type="text" name="letter" maxlength="1" autofocus />
            </div>
         </div>

         <div class="row mt-4">
            <div class="col text-center">
               <button type="button" id="resetGame" class="btn btn-secondary">
                  Restart Game
               </button>
            </div>
         </div>

         <div class="row mt-4" id="hasWon" style="display:none;">
            <div class="col text-center rainbowText">
               Congratulations! You guessed the word: <strong class="currentWord"></strong>
            </div>
         </div>
         <div class="row mt-4" id="hasLost" style="display:none;">
            <div class="col text-center gameoverText">
               Game over! The word was: <strong class="currentWord"></strong>
            </div>
         </div>


      </div>

      <script src="hangman.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
   </body>
</html>
